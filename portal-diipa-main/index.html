<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portal DIIPA</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #0C2E66;
    --navy-2: #1E50A0;
    --aqua: #009B94;
    --dorado: #C9A227;
    --tinta: #1A2233;
    --humo: #64748B;
    --nube: #F4F6FA;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Inter", system-ui, sans-serif;
    background: var(--nube);
    color: var(--tinta);
    min-height: 100vh;
  }
  h1, h2, h3, .display { font-family: "Sora", system-ui, sans-serif; }

  /* ---------- pantalla de carga ---------- */
  .centro {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ---------- login ---------- */
  .login-fondo {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: linear-gradient(135deg, var(--navy) 0%, #103A3A 60%, #0C5C46 100%);
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: 20px;
    padding: 40px 32px 32px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,.25);
  }
  .login-card img.logo-login { height: 34px; margin-bottom: 18px; }
  .login-card h1 { font-size: 20px; font-weight: 800; color: var(--navy); margin: 0 0 2px; }
  .login-card p.sub { color: var(--humo); font-size: 13px; margin: 0 0 24px; }
  .btn-google {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: 1px solid #dadce0;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    background: #fff;
    cursor: pointer;
  }
  .btn-google:hover { background: #f8f9fa; }
  .btn-google img { height: 20px; width: 20px; }
  .nota { font-size: 11px; color: var(--humo); margin-top: 14px; }

  /* ---------- acceso restringido ---------- */
  .restringido { text-align: center; max-width: 340px; }
  .restringido button {
    margin-top: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 10px 18px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
  }

  /* ---------- portal (logueado) ---------- */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: #fff;
    border-bottom: 1px solid #E5E9F0;
  }
  .top .marca { display: flex; align-items: center; gap: 10px; }
  .top .marca img { height: 24px; display: block; }
  .top .quien { font-size: 12px; color: var(--humo); display: flex; align-items: center; gap: 10px; }
  .top .quien button {
    border: none;
    background: none;
    color: var(--navy-2);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
  }
  main { max-width: 960px; margin: 0 auto; padding: 32px 24px 60px; }

  /* ---------- bienvenida (hero) ---------- */
  .bienvenida {
    position: relative;
    border-radius: 22px;
    overflow: hidden;
    background: linear-gradient(120deg, var(--navy) 0%, #123A73 45%, #0C5C46 100%);
    color: #fff;
    padding: 38px 40px;
    margin-bottom: 34px;
    display: flex;
    align-items: center;
    gap: 36px;
    box-shadow: 0 18px 40px rgba(12,46,102,.22);
  }
  .bienvenida::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(600px 300px at 85% 15%, rgba(0,155,148,.35), transparent 60%),
      radial-gradient(500px 260px at 10% 100%, rgba(201,162,39,.18), transparent 60%);
    pointer-events: none;
  }
  .bienvenida-texto { position: relative; flex: 1 1 380px; min-width: 0; }
  .bienvenida-texto img.logo-hero { height: 30px; margin-bottom: 22px; }
  .bienvenida-texto h1 {
    font-size: 26px;
    line-height: 1.25;
    margin: 0 0 6px;
    font-weight: 800;
    letter-spacing: .2px;
  }
  .bienvenida-texto p.saludo {
    font-size: 14.5px;
    color: #CFE0FF;
    margin: 0 0 22px;
    font-weight: 500;
  }
  .bienvenida-texto p.saludo b { color: #fff; }
  .mv-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 18px;
  }
  .mv-item {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 14px;
    padding: 14px 16px;
    backdrop-filter: blur(2px);
  }
  .mv-item span.etiqueta {
    display: block;
    font-size: 10.5px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--dorado);
    font-weight: 700;
    margin-bottom: 5px;
  }
  .mv-item p {
    margin: 0;
    font-size: 12.5px;
    line-height: 1.5;
    color: #EAF0FF;
  }
  .bienvenida-texto p.lema {
    margin: 0;
    font-size: 13px;
    font-style: italic;
    color: #FFE9AE;
    border-left: 3px solid var(--dorado);
    padding-left: 12px;
  }
  .bienvenida-img {
    position: relative;
    flex: 0 0 260px;
    display: flex;
    justify-content: center;
  }
  .bienvenida-img img {
    width: 260px;
    height: 200px;
    object-fit: cover;
    border-radius: 16px;
    box-shadow: 0 14px 34px rgba(0,0,0,.35);
    border: 4px solid rgba(255,255,255,.15);
  }
  @media (max-width: 760px) {
    .bienvenida { flex-direction: column; padding: 30px 24px; }
    .bienvenida-img { order: -1; flex-basis: auto; }
    .bienvenida-img img { width: 100%; max-width: 320px; height: 170px; }
    .mv-grid { grid-template-columns: 1fr; }
  }

  main h2.titulo-sistemas { font-size: 18px; margin: 0 0 4px; color: var(--tinta); }
  main p.intro { color: var(--humo); font-size: 13.5px; margin: 0 0 22px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }
  .card {
    position: relative;
    background: #fff;
    border-radius: 16px;
    padding: 22px;
    border: 1px solid #E5E9F0;
    border-top: 3px solid var(--card-color, var(--navy));
    cursor: pointer;
    transition: transform .12s, box-shadow .12s;
    text-align: left;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(12,46,102,.10); }
  .card:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  .card .icono {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
    background: color-mix(in srgb, var(--card-color, var(--navy)) 12%, #fff);
    padding: 8px;
  }
  .card .icono img { width: 100%; height: 100%; object-fit: contain; }
  .card h3 { margin: 0 0 4px; font-size: 15px; font-weight: 700; color: var(--tinta); }
  .card p { margin: 0; font-size: 12.5px; color: var(--humo); line-height: 1.4; }
  .card .entrando { font-size: 12px; color: var(--aqua); font-weight: 600; margin-top: 10px; }

  .error-msg {
    background: #FEF2F2; color: #B91C1C; border: 1px solid #FCA5A5;
    border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 18px;
  }
</style>
</head>
<body>

<div id="app" class="centro">Cargando…</div>

<script type="module">
  // =====================================================================
  //  PORTAL DIIPA — punto de entrada único
  //  Un solo archivo, sin paso de build. Para cambiar algo, editas
  //  directo aquí y vuelves a subir el archivo a GitHub.
  // =====================================================================

  // ---- Conexión al MISMO Supabase de autenticación que ya usan
  //      JusticiaFácil y JurisConecta (no crear uno nuevo). ----
  const AUTH_URL = "https://xzvtgjtumvwftulqxiao.supabase.co";
  const AUTH_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6dnRnanR1bXZ3ZnR1bHF4aWFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDU0NzUsImV4cCI6MjA5NzAyMTQ3NX0.W1CwPHCop68e0z_lCiX85EaIUoaJPG3huy2OjlZlSy4";
  const DOMINIO_PERMITIDO = "diipadesarrollos.com";

  // ---- A dónde le pega para pedir el código de traspaso de sesión ----
  // (las 2 funciones que ya subiste a JurisConecta en la Fase 1)
  const FUNCIONES_SSO = "https://jurisconecta.netlify.app/.netlify/functions";

  // ---- Los sistemas que aparecen como tarjetas. Para agregar SIGA o
  //      Contabilidad cuando existan, solo agregas otro objeto aquí. ----
  const SISTEMAS = [
    {
      id: "jf",
      nombre: "JusticiaFácil",
      descripcion: "Casos jurídicos, dictámenes, cesiones y seguimiento de garantías.",
      logo: "assets/img/jf-icon.png",
      color: "#0B1E3A",
      url: "https://justiciafacil.netlify.app",
    },
    {
      id: "jc",
      nombre: "JurisConecta",
      descripcion: "Conmutador, clientes, prospectos y chat interno del equipo.",
      logo: "assets/img/jc-icon.png",
      color: "#1E50A0",
      url: "https://jurisconecta.netlify.app",
    },
  ];

  // ---- Nombre y rol principal de cada persona, según su correo. ----
  // Agrega aquí a cada quien con su correo exacto de @diipadesarrollos.com.
  // Si un correo no está en esta lista, se arma un nombre a partir del
  // correo y se le pone el rol genérico "Equipo DIIPA".
  const ROLES = {
    "erikapaola@diipadesarrollos.com": { nombre: "Erika Paola España Méndez", rol: "Administradora Única · DGE" },
    // "milton@diipadesarrollos.com":   { nombre: "Milton Castro",  rol: "Dirección Jurídica · DIL" },
    // "luiscarlos@diipadesarrollos.com": { nombre: "Luis Carlos",  rol: "Dirección Comercial · DGC" },
    // "jesus@diipadesarrollos.com":     { nombre: "Jesús",         rol: "Administración y Finanzas · GAD" },
    // "jhon@diipadesarrollos.com":      { nombre: "Jhon Eduar",    rol: "Tecnología · DTR" },
    // "michelle@diipadesarrollos.com":  { nombre: "Michelle",      rol: "Atención a Clientes · RAC" },
  };

  function datosDePersona(email) {
    if (ROLES[email]) return ROLES[email];
    const local = email.split("@")[0] || email;
    const nombre = local
      .replace(/[._]+/g, " ")
      .trim()
      .split(" ")
      .filter(Boolean)
      .map((w) => w.charAt(0).toUpperCase() + w.slice(1))
      .join(" ");
    return { nombre: nombre || email, rol: "Equipo DIIPA" };
  }

  const app = document.getElementById("app");

  let supabase;
  async function getAuth() {
    if (supabase) return supabase;
    const mod = await import("https://esm.sh/@supabase/supabase-js@2");
    supabase = mod.createClient(AUTH_URL, AUTH_KEY);
    return supabase;
  }

  function correoPermitido(email) {
    return !!email && email.toLowerCase().endsWith("@" + DOMINIO_PERMITIDO);
  }

  // ---------- pantallas ----------

  function pintarLogin(auth) {
    app.className = "login-fondo";
    app.innerHTML = `
      <div class="login-card">
        <img class="logo-login" src="assets/img/ia-logo-color.png" alt="Inmuebles Accesibles" />
        <h1>Portal DIIPA</h1>
        <p class="sub">Entra una vez, accede a todos tus sistemas</p>
        <button class="btn-google" id="btnEntrar">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" />
          Entrar con Google
        </button>
        <p class="nota">Solo cuentas @${DOMINIO_PERMITIDO}</p>
      </div>
    `;
    document.getElementById("btnEntrar").onclick = async () => {
      await auth.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: window.location.origin },
      });
    };
  }

  function pintarRestringido(auth, email) {
    app.className = "centro";
    app.innerHTML = `
      <div class="restringido">
        <p style="font-size:16px;font-weight:600;">Acceso restringido</p>
        <p style="font-size:13px;color:var(--humo);margin-top:6px;">
          Tu correo <b>${email}</b> no pertenece a <b>@${DOMINIO_PERMITIDO}</b>.
        </p>
        <button id="btnSalir">Cambiar de cuenta</button>
      </div>
    `;
    document.getElementById("btnSalir").onclick = async () => {
      await auth.auth.signOut();
      location.reload();
    };
  }

  function pintarPortal(auth, email) {
    const { nombre, rol } = datosDePersona(email);

    app.className = "";
    document.body.style.minHeight = "100vh";
    app.innerHTML = `
      <div class="top">
        <div class="marca"><img src="assets/img/ia-logo-color.png" alt="Inmuebles Accesibles" /></div>
        <div class="quien">${email} <button id="btnSalir2">Salir</button></div>
      </div>
      <main>
        <div class="bienvenida">
          <div class="bienvenida-texto">
            <img class="logo-hero" src="assets/img/ia-logo-light.png" alt="Inmuebles Accesibles" />
            <h1>Bienvenido a DIIPA Desarrollos S.A. de C.V.</h1>
            <p class="saludo">Hola, <b>${nombre}</b> — ${rol}</p>
            <div class="mv-grid">
              <div class="mv-item">
                <span class="etiqueta">Misión</span>
                <p>Convertir garantías hipotecarias en resultados justos y rentables, llevando cada expediente con un manejo 100% legal, ordenado y transparente.</p>
              </div>
              <div class="mv-item">
                <span class="etiqueta">Visión</span>
                <p>Ser la firma que cambió la forma de trabajar los remates en México: del lado de la ley, con datos claros y resultados reales.</p>
              </div>
            </div>
            <p class="lema">Venimos a cambiar este negocio. Nadie más trabaja los remates de esta manera, tan legal.</p>
          </div>
          <div class="bienvenida-img">
            <img src="assets/img/hero-foto.png" alt="DIIPA Desarrollos" />
          </div>
        </div>

        <h2 class="titulo-sistemas">Tus sistemas</h2>
        <p class="intro">Elige a dónde quieres entrar. Vas a llegar con tu sesión ya iniciada.</p>
        <div id="errorBox"></div>
        <div class="grid" id="grid"></div>
      </main>
    `;
    document.getElementById("btnSalir2").onclick = async () => {
      await auth.auth.signOut();
      location.reload();
    };

    const grid = document.getElementById("grid");
    SISTEMAS.forEach((s) => {
      const card = document.createElement("button");
      card.className = "card";
      card.style.setProperty("--card-color", s.color);
      card.innerHTML = `
        <div class="icono"><img src="${s.logo}" alt="${s.nombre}" /></div>
        <h3>${s.nombre}</h3>
        <p>${s.descripcion}</p>
      `;
      card.onclick = () => entrarASistema(auth, s, card);
      grid.appendChild(card);
    });
  }

  function mostrarError(msg) {
    const box = document.getElementById("errorBox");
    if (box) box.innerHTML = `<div class="error-msg">${msg}</div>`;
  }

  async function entrarASistema(auth, sistema, card) {
    card.disabled = true;
    const original = card.innerHTML;
    card.innerHTML = original + `<div class="entrando">Entrando…</div>`;
    try {
      const { data } = await auth.auth.getSession();
      const session = data?.session;
      if (!session) throw new Error("Sesión no encontrada, vuelve a entrar.");

      const res = await fetch(`${FUNCIONES_SSO}/crear-sso`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          access_token: session.access_token,
          refresh_token: session.refresh_token,
        }),
      });
      if (!res.ok) {
        const detalle = await res.text().catch(() => "");
        throw new Error(`No se pudo preparar el acceso a ${sistema.nombre}${detalle ? ": " + detalle : ""}`);
      }
      const { code } = await res.json();

      window.location.href = `${sistema.url}/?sso=${encodeURIComponent(code)}`;
    } catch (e) {
      card.disabled = false;
      card.innerHTML = original;
      mostrarError((e && e.message) || `No se pudo entrar a ${sistema.nombre}. Intenta de nuevo.`);
    }
  }

  // ---------- arranque ----------
  (async () => {
    const auth = await getAuth();
    const { data } = await auth.auth.getSession();
    const email = data?.session?.user?.email || null;

    if (!email) { pintarLogin(auth); return; }
    if (!correoPermitido(email)) { pintarRestringido(auth, email); return; }
    pintarPortal(auth, email);

    auth.auth.onAuthStateChange((_evt, session) => {
      const e = session?.user?.email || null;
      if (!e) pintarLogin(auth);
      else if (!correoPermitido(e)) pintarRestringido(auth, e);
      else pintarPortal(auth, e);
    });
  })();
</script>
</body>
</html>
